<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — Bamboo Mat</title>
    <meta
      name="description"
      content="Through the lens: the room, the counter and the plates at Bamboo Mat, Stratford."
    />
    <meta name="theme-color" content="#171814" />
    <script>
      (function () {
        var c = document.documentElement.classList;
        c.add('js');
        try {
          if (!sessionStorage.getItem('bm:visited')) c.add('is-first-visit');
          if (sessionStorage.getItem('bm:leaving')) c.add('is-arriving');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/img/bamboo_logo.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body data-page="gallery">
    <main id="main">
      <!-- §7 header -->
      <section class="gallery-head">
        <div class="container">
          <p class="eyebrow">Gallery</p>
          <h1 class="display">Through <em>the lens</em>.</h1>
        </div>
      </section>

      <!-- Masonry grid rendered by gallery.js from its image list -->
      <section class="gallery-body">
        <div class="container">
          <div class="gallery-grid" data-gallery></div>
        </div>
      </section>
    </main>
  </body>
</html>

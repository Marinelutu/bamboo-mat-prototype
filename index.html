    <title>Bamboo Mat — Nikkei Dining in Stratford, London</title>
    <meta
      name="description"
      content="Where Tokyo meets Lima. Bamboo Mat is a Nikkei restaurant in East Village, Stratford — ceviche, sushi and the anticucho grill, minutes from Westfield."
    />
    <meta name="theme-color" content="#171814" />
    <script>
      (function () {
        var c = document.documentElement.classList;
        c.add('js');
        try {
          if (!sessionStorage.getItem('bm:visited')) c.add('is-first-visit');
          if (sessionStorage.getItem('bm:leaving')) c.add('is-arriving');
        } catch (e) {}
      })();
    </script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Menu — Bamboo Mat</title>
    <meta
      name="description"
      content="Two coastlines, one table. Tasting menus, ceviche, maki, nigiri, the anticucho grill and signature cocktails at Bamboo Mat, Stratford."
    />
    <meta name="theme-color" content="#171814" />
    <script>
      (function () {
        var c = document.documentElement.classList;
        c.add('js');
        try {
          if (!sessionStorage.getItem('bm:visited')) c.add('is-first-visit');
          if (sessionStorage.getItem('bm:leaving')) c.add('is-arriving');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/img/bamboo_logo.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body data-page="menu">
    <main id="main">
      <!-- §4 compact hero -->
      <section class="menu-hero">
        <div class="menu-hero-media" aria-hidden="true">
          <img src="/assets/img/g-20.jpg" alt="" fetchpriority="high" />
          <div class="menu-hero-shade"></div>
        </div>
        <div class="container menu-hero-content">
          <p class="eyebrow">The Menu</p>
          <h1 class="display">Two coastlines, <em>one table</em>.</h1>
          <p class="origin-quote">
            “Far from home, Japanese hands met Peruvian soil… From this quiet alchemy, Nikkei
            cuisine was born.”
          </p>
        </div>
      </section>

      <!-- Tasting menus first -->
      <section class="tastings section">
        <div class="container">
          <div class="tastings-grid" data-tastings></div>
        </div>
      </section>

      <!-- Sticky category nav -->
      <nav class="menu-chipbar" aria-label="Menu categories">
        <div class="container menu-chipbar-row" data-chipbar></div>
      </nav>

      <!-- Menu sections rendered from src/js/data/menu-data.js -->
      <div class="container menu-sections" data-menu-sections></div>

      <div class="container">
        <p class="menu-foot mono">
          VG — plant-based friendly (tags illustrative for this prototype). A discretionary 12.5%
          service charge will be added to bills.
        </p>
      </div>
    </main>
  </body>
</html>

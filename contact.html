<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Us — Bamboo Mat</title>
    <meta
      name="description"
      content="21-24 Victory Parade, East Village, London E20 1FS — a three-minute walk from Westfield Stratford."
    />
    <meta name="theme-color" content="#171814" />
    <script>
      (function () {
        var c = document.documentElement.classList;
        c.add('js');
        try {
          if (!sessionStorage.getItem('bm:visited')) c.add('is-first-visit');
          if (sessionStorage.getItem('bm:leaving')) c.add('is-arriving');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/img/bamboo_logo.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <script type="module" src="/src/js/main.js"></script>
  </head>
  <body data-page="contact">
    <main id="main">
      <!-- §7 split layout -->
      <section class="contact-split">
        <div class="contact-info">
          <p class="eyebrow">Find Us</p>
          <h1 class="display">A three-minute walk from <em>Westfield</em>.</h1>

          <dl class="contact-blocks">
            <div class="contact-block">
              <dt class="mono">Address</dt>
              <dd>21-24 Victory Parade, East Village,<br />London E20 1FS</dd>
            </div>
            <div class="contact-block">
              <dt class="mono">Email</dt>
              <dd><a href="mailto:bamboomatuk@gmail.com">bamboomatuk@gmail.com</a></dd>
            </div>
            <div class="contact-block">
              <dt class="mono">Hours</dt>
              <dd>
                Tue–Fri 12:00–22:00<br />
                Sat 11:00–22:30<br />
                Sun 11:00–21:30<br />
                <span class="mono contact-note">placeholder — confirm with venue</span>
              </dd>
            </div>
            <div class="contact-block">
              <dt class="mono">Instagram</dt>
              <dd>
                <a
                  href="https://www.instagram.com/_bamboomatstratford"
                  target="_blank"
                  rel="noopener"
                  >@_bamboomatstratford</a
                >
              </dd>
            </div>
          </dl>

          <div class="contact-ctas">
            <a
              class="btn btn-ghost"
              href="https://maps.google.com/?q=Bamboo+Mat,+21-24+Victory+Parade,+London+E20+1FS"
              target="_blank"
              rel="noopener"
              >Get directions</a
            >
            <button type="button" class="btn btn-gold" data-reserve>Reserve</button>
          </div>
        </div>

        <div class="contact-map">
          <iframe
            title="Map — Bamboo Mat, 21-24 Victory Parade, London E20 1FS"
            src="https://www.google.com/maps?q=Bamboo%20Mat%2C%2021-24%20Victory%20Parade%2C%20London%20E20%201FS&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen
          ></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
